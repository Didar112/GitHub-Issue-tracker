    <div class="navbar bg-base-100 shadow-sm">
        <div class="md:flex-1 ">
            <div class="flex items-center ml-10">
                <img class="h-6 mr-2" src="../assets/github-logo.png" alt="">
                <a href="" class="font-bold text-xl">GitHub Issues Tracker</a>
            </div>
        </div>

        <label class="input">
            <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none" stroke="currentColor">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.3-4.3"></path>
                </g>
            </svg>
            <input id="srbox" type="search" required placeholder="Search issues..." />
        </label>
        <button onclick="srcBtnClick()" id="find-btn" class="btn btn-primary ml-2">Search</button>
    </div>



    <!-- catagory buttons section -->

    <section class="container mt-[60px] mx-auto mb-[16px]">
        <div class="card card-side bg-base-100 shadow-sm">
  
            <div class="p-6 space-x-2">
                <button onclick="getAllissues()" id="all-btn" class="btn btn-outline btn-primary w-28">All</button>
                <button onclick="getOpenissues()" id="open-btn" class="btn btn-outline btn-primary w-28">Open</button>
                <button onclick="getClosedissues()"  id="close-btn" class="btn btn-outline btn-primary w-28">Closed</button>
            </div>
</div>
    </section>

        <div class="flex justify-between p-[24px]">

                    <img src="./assets/Aperture.png" alt="">
                </div>
                <div>

                <div class="flex gap-2 items-center"><img  src="./assets/Ellipse-2-(1).png" alt="">
                    <p>Closed</p>
